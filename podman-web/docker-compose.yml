services:
  podman-web:
    build: .
    container_name: podman-web

    privileged: true

    ports:
      - "9876:3000"

    volumes:
      - podman_storage:/home/poduser/.local/share/containers
      - ./project:/project
      - ./claude-config:/home/poduser/claudeconfig

    environment:
      - ANTHROPIC_API_KEY

volumes:
  podman_storage:
