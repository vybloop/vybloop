[containers]
# Use netavark + pasta/slirp4netns for rootless networking
default_network = "podman"
network_backend = "netavark"
# /proc/sys is read-only in nested container environments; skip the default
# rootless sysctl (ping_group_range) that crun would otherwise fail to set.
default_sysctls = []

[engine]
# Disable cgroup management inside the outer container;
# cgroups v2 may or may not be available depending on host kernel.
cgroup_manager = "cgroupfs"

# Explicitly use crun (lighter than runc, better rootless support)
runtime = "crun"
