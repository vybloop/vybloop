[containers]
# Use netavark + pasta/slirp4netns for rootless networking
default_network = "podman"
network_backend = "netavark"
# /proc/sys is read-only in nested container environments; skip the default
# rootless sysctl (ping_group_range) that crun would otherwise fail to set.
default_sysctls = []

[engine]
# Use the boltdb libpod database backend instead of sqlite. Our graphRoot lives
# on a persistent volume, but the runRoot / SHM lock segment are ephemeral (wiped
# on every container restart), so `podman system renumber` must run at startup to
# re-sync lock IDs (see start.sh). On podman 4.9.x the sqlite backend's renumber
# is broken whenever a volume exists (containers/podman#23052: "no such column:
# ID"), which left lock collisions unfixed. boltdb's renumber works correctly.
database_backend = "boltdb"

# Disable cgroup management inside the outer container;
# cgroups v2 may or may not be available depending on host kernel.
cgroup_manager = "cgroupfs"

# Explicitly use crun (lighter than runc, better rootless support)
runtime = "crun"
